# Phase 0 spike: single FNN testnet (Pudge) node.
# Run ./setup-fnn.sh first — it generates the key, seeds the patched config,
# and creates .env. Do not `docker compose up` from a bare clone.
#
# Pinned to v0.8.1 (latest v0.8.x release; architecture targets FNN v0.8.x).
# No 0.8.x image is published on Docker Hub / GHCR (publishing started at
# 0.9.0-rc), so setup-fnn.sh builds this tag locally from the repo Dockerfile.
services:
  fnn:
    image: fiber:0.8.1-local
    container_name: evenkeel-spike-fnn
    restart: unless-stopped
    environment:
      # Required by the image entrypoint; encrypts the key in ./fiber-node/ckb/key.
      FIBER_SECRET_KEY_PASSWORD: ${FIBER_SECRET_KEY_PASSWORD:?run setup-fnn.sh to create .env}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./fiber-node:/fiber
    ports:
      - "8228:8228" # Fiber P2P
      # RPC can spend funds. FNN v0.8.x refuses non-private RPC binds without
      # biscuit auth (0.0.0.0 counts as public), so the container gets a static
      # RFC1918 IP below and the config binds 172.28.0.2:8227. The HOST bind
      # stays loopback-only — never expose this beyond the machine (§9).
      - "127.0.0.1:8227:8227"
    networks:
      default:
        ipv4_address: 172.28.0.2

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
